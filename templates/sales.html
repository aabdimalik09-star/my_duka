{% extends "base.html" %}

{% block title %} Sales Management {% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Sales Records</h2>
    
    <table id="example" class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product ID (PID)</th>
                <th>Quantity Sold</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody>
            {% for sale in sales %}
            <tr>
                <td>{{ sale[0] }}</td>
                <td>{{ sale[1] }}</td>
                <td>{{ sale[2] }}</td>
                <td>{{ sale[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
