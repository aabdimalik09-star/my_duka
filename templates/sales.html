{% extends "base.html" %}

{% block title %} Record Sales {% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-5 mb-4">
        <div class="card border-0 shadow sticky-top" style="top: 20px;">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="card-title mb-0">🛒 New Sale Transaction</h5>
            </div>
            <div class="card-body p-4">
                <form action="/make_sale" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Product</label>
                        <select class="form-select form-select-lg" name="product_id">
                            <option selected>Search for product...</option>
                            <option value="1">Sugar (1kg) - Ksh 150</option>
                            <option value="2">Cooking Oil (3L) - Ksh 850</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Quantity</label>
                            <input type="number" class="form-control form-control-lg" value="1" min="1">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Discount (%)</label>
                            <input type="number" class="form-control form-control-lg" placeholder="0">
                        </div>
                    </div>

                    <div class="bg-light p-3 rounded mb-4 text-center">
                        <span class="text-muted">Total Amount Due</span>
                        <h2 class="fw-bold text-primary mb-0">Ksh 0.00</h2>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 py-3 shadow">
                        COMPLETE SALE
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold">Today's Recent Sales</h4>
            <a href="#" class="text-decoration-none">View All Reports</a>
        </div>
        
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0 fw-bold">Sale #88293</h6>
                    <small class="text-muted">2 mins ago • 3 Items</small>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-success">Ksh 1,450</div>
                    <span class="badge bg-secondary">Cash</span>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-3 border-start border-warning border-4">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0 fw-bold">Sale #88292</h6>
                    <small class="text-muted">15 mins ago • 1 Item</small>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-success">Ksh 200</div>
                    <span class="badge bg-info text-dark">M-Pesa</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
