{% extends 'base.html' %}
{% block title %} sales {% endblock %}
{% block content %}

<style>
    body { background-color: #f8f9fc; }
    
    .main-wrapper {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
        margin-top: 2rem;
    }

    /* Professional Table Headers */
    .table thead th {
        background-color: #f8f9fc;
        color: #4e73df;
        text-transform: uppercase;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05rem;
        border-top: none;
        border-bottom: 2px solid #e3e6f0;
        padding: 15px;
    }

    /* Table Row Styling */
    .table tbody td {
        padding: 15px;
        color: #5a5c69;
        vertical-align: middle;
        border-bottom: 1px solid #e3e6f0;
    }

    .table tbody tr:hover {
        background-color: #f8f9fc;
    }

    /* Specific column styling */
    .sales-id { font-weight: bold; color: #858796; }
    .product-id-style { color: #4e73df; font-weight: 600; }
    .quantity-style { font-weight: 700; color: #1cc88a; }
    .date-style { color: #b7b9cc; font-size: 0.9rem; }

    .btn-primary {
        background-color: #4e73df;
        border: none;
        border-radius: 5px;
        padding: 8px 20px;
        font-weight: 600;
    }
</style>

<div class="container main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Sales Records</h2>
        <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Add sales
        </button>
    </div>

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 fw-bold" id="exampleModalLabel">Adding a sales</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" action="/add_sales">
                        <select class="form-select mb-3" name="pid" aria-label="Default select example">
                            <option selected>select products</option>
                            {% for products in products_data%}
                            <option value="{{ products[0]}}">{{ products[1]}} </option>
                            {% endfor %}
                        </select>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">quantity </label>
                            <input type="number" name="quantity" class="form-control" id="exampleInputPassword1">
                        </div>
                        <div class="modal-footer border-0 p-0 mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary">Add sales</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table id="example" class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product ID</th>
                    <th>Quantity</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody>
                {% for sales in sales_data %}
                <tr>
                    <td class="sales-id">{{ sales[0] }}</td>
                    <td class="product-id-style">{{ sales[1] }}</td>
                    <td class="quantity-style">{{ sales[2] }}</td>
                    <td class="date-style">{{ sales[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
