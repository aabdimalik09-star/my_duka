<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} MyDuka {% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --accent-blue: #00d2ff;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa; /* Light background for the whole site */
        }

        /* FIXED NAVBAR THAT STAYS AT THE TOP */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 2000; /* High number so it stays above everything */
            background: rgba(18, 18, 18, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-blue);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-blue) !important;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            padding: 10px 15px !important;
        }

        .nav-link:hover {
            color: var(--accent-blue) !important;
        }

        /* SPECIAL REGISTER BUTTON */
        .btn-register {
            background-color: var(--accent-blue) !important;
            color: black !important;
            font-weight: bold !important;
            border-radius: 50px;
            padding: 8px 20px !important;
            margin-left: 10px;
        }

        main {
            flex: 1;
        }

        footer {
            background: var(--bg-dark);
            color: white;
            padding: 30px 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="/">MYDUKA</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myDukaNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="myDukaNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sales">Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stock">Stock</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-info" href="/login">Login</a></li>
                    <li class="nav-item">
                        <a class="nav-link btn-register" href="/register">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 MyDuka Systems. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
