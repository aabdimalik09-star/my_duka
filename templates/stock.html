{% extends "base.html" %}

{% block title %} Inventory Management {% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Stock Inventory</h2>
    
    <table id="example" class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product ID (PID)</th>
                <th>Stock Quantity</th>
                <th>Last Updated</th>
            </tr>
        </thead>
        <tbody>
            {% for item in stock %}
            <tr>
                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>{{ item[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
